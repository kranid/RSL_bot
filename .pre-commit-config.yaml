repos:
  - repo: local
    hooks:

    # Сортировка импортов
    -   id: isort
        name: isort
        entry: isort --settings-file=.isort.cfg app
        language: system
        types: [python]
        pass_filenames: false

    # Автоформаттер
    - id: black
      name: black
      entry: black --config=.black app
      language: system
      types: [python]
      pass_filenames: false

    # Соответствие pep8
    - id: flake8
      name: flake8
      entry: flake8 --config=.flake8 app
      language: system
      types: [python]
      pass_filenames: false

